name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test inquiry contract
        run: npm run test:inquiry
      - name: Type-check
        run: npx tsc --noEmit
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Build static site
        run: npm run build
        env:
          # Public, build-time values only. Unset or incomplete values keep the
          # Inquiry handoff fail-closed; never put server secrets here.
          NEXT_PUBLIC_HOMEGROUND_INQUIRY_ENABLED: ${{ vars.NEXT_PUBLIC_HOMEGROUND_INQUIRY_ENABLED }}
          NEXT_PUBLIC_HOMEGROUND_INQUIRY_API_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_INQUIRY_API_URL }}
          NEXT_PUBLIC_HOMEGROUND_BRAND_EMAIL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_BRAND_EMAIL }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_READY: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_READY }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_EN: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_EN }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_ZH: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_ZH }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_KO: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_KO }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_EN: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_EN }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_ZH: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_ZH }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_KO: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_KO }}
          NEXT_PUBLIC_HOMEGROUND_DIRECT_WHATSAPP_ENABLED: ${{ vars.NEXT_PUBLIC_HOMEGROUND_DIRECT_WHATSAPP_ENABLED }}
          NEXT_PUBLIC_HOMEGROUND_WHATSAPP_NUMBER: ${{ vars.NEXT_PUBLIC_HOMEGROUND_WHATSAPP_NUMBER }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
