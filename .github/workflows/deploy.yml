name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test inquiry contract
        run: npm run test:inquiry
      - name: Type-check
        run: npx tsc --noEmit
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Build static site
        run: npm run build
        env:
          # Public, build-time values only. Unset or incomplete values keep the
          # Inquiry handoff fail-closed; never put server secrets here.
          NEXT_PUBLIC_HOMEGROUND_INQUIRY_ENABLED: ${{ vars.NEXT_PUBLIC_HOMEGROUND_INQUIRY_ENABLED }}
          NEXT_PUBLIC_HOMEGROUND_INQUIRY_API_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_INQUIRY_API_URL }}
          NEXT_PUBLIC_HOMEGROUND_BRAND_EMAIL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_BRAND_EMAIL }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_READY: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_READY }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_EN: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_EN }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_ZH: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_ZH }}
          NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_KO: ${{ vars.NEXT_PUBLIC_HOMEGROUND_PRIVACY_NOTICE_URL_KO }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_EN: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_EN }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_ZH: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_ZH }}
          NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_KO: ${{ vars.NEXT_PUBLIC_HOMEGROUND_REPLY_SLA_KO }}
          NEXT_PUBLIC_HOMEGROUND_WHATSAPP_INTAKE_ENABLED: ${{ vars.NEXT_PUBLIC_HOMEGROUND_WHATSAPP_INTAKE_ENABLED }}
          # Public project identifiers and a publishable key only. Admin
          # authorization remains server-side (JWT + MFA + UUID allow-list).
          NEXT_PUBLIC_HOMEGROUND_ADMIN_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_ADMIN_SUPABASE_URL }}
          NEXT_PUBLIC_HOMEGROUND_ADMIN_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_HOMEGROUND_ADMIN_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_HOMEGROUND_ADMIN_INSIGHTS_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_ADMIN_INSIGHTS_URL }}
          NEXT_PUBLIC_HOMEGROUND_ADMIN_HEALTH_URL: ${{ vars.NEXT_PUBLIC_HOMEGROUND_ADMIN_HEALTH_URL }}
      - name: Check ten-day guide export
        run: npm run check:ten-day-guide-export
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
